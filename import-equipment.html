function log(msg) {
    const el = document.getElementById('status');
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
}

window.runImport = async function() {
    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.textContent = '⏳ Starting...';
    document.getElementById('status').textContent = '';
    document.getElementById('progress-bar-wrap').classList.remove('hidden');
    document.getElementById('progress-label').classList.remove('hidden');

    try {
        log('Reading Firebase config...');
        const { getItem: _getItem } = await import('./js/storage.js');
        const cfg = JSON.parse(_getItem('shopAppFirebaseConfig') || '{}');
        if (!cfg.apiKey) throw new Error('No Firebase config found. Go to Settings and save your Firebase config first, then come back here.');

        const settings = JSON.parse(_getItem('shopAppSettings') || '{}');
        const companyId = settings.companyId;
        if (!companyId) throw new Error('No Company ID found. Go to Settings and save your Company ID first.');

        log('Initializing Firebase...');
        let app;
        try { app = firebase.app(); } catch(e) { app = firebase.initializeApp(cfg); }
        const db = firebase.firestore();

        log(`Company: ${settings.companyName || companyId}`);
        log('Checking for existing equipment...');

        const existing = await db.collection('companies').doc(companyId).collection('equipment').get();
        const existingUnits = new Set(existing.docs.map(d => d.data().unitNumber));
        log(`Found ${existingUnits.size} existing. Importing ${equipment.length} units...\n`);

        let added = 0, skipped = 0;
        const col = db.collection('companies').doc(companyId).collection('equipment');

        for (let i = 0; i < equipment.length; i++) {
            const eq = equipment[i];
            document.getElementById('progress-bar').style.width = Math.round(((i+1)/equipment.length)*100) + '%';
            document.getElementById('progress-label').textContent = `${i+1} / ${equipment.length}`;

            if (existingUnits.has(eq.unitNumber)) {
                log(`SKIP  ${eq.unitNumber}`);
                skipped++; continue;
            }
            await col.add({
                ...eq,
                inspectionResetMonthDay: eq.requiresInspection ? 'Nov 1' : '',
                active: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            log(`✓  ${eq.unitNumber} — ${eq.makeModel}`);
            added++;
        }

        log(`\n✅ DONE! ${added} added, ${skipped} skipped.`);
        btn.textContent = `✅ Done — ${added} units added`;
        btn.style.background = '#16a34a';
    } catch(e) {
        log(`\n❌ ERROR: ${e.message}`);
        btn.disabled = false;
        btn.textContent = '▶ Retry';
    }
};
