<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shop Work Orders</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white" id="company-name-display">Shop Work Orders</h1>
        <p class="text-gray-400 mt-2 text-sm">Sign in to your account</p>
    </div>

    <div class="bg-gray-800 rounded-xl shadow-2xl p-8 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
            <input type="email" id="login-email" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="you@example.com" autocomplete="email">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
            <input type="password" id="login-password" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="login-error" class="hidden text-red-400 text-sm"></div>
        <div id="login-success" class="hidden text-green-400 text-sm"></div>
        <button id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition text-base">Sign In</button>
        <div class="text-center">
            <button id="forgot-btn" class="text-xs text-gray-500 hover:text-indigo-400 transition">Forgot password?</button>
        </div>
        <div class="text-center text-sm text-gray-400 space-y-1">
            <p>Don't have an account? <a href="register.html" id="login-register-link" class="text-indigo-400 hover:underline">Register with invite code</a></p>
        </div>
    </div>
</div>

<script type="module">
    import { initFirebaseAsync, getAuthInstance } from './js/firebase-init.js';
    import { loginUser, onAuthChange } from './js/auth.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getItem } from './js/storage.js';

    const bootstrapSearch = window.location.search || '';
    document.getElementById('login-register-link').href = `register.html${bootstrapSearch}`;

    const settings = JSON.parse(getItem('shopAppSettings') || '{}');
    document.getElementById('company-name-display').textContent = settings.companyName || 'Shop Work Orders';

    let firebaseOk = false;

    // Attach ALL event listeners FIRST before any async operations
    document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        errEl.classList.add('hidden');
        if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.classList.remove('hidden'); return; }
        if (!firebaseOk) {
            errEl.textContent = 'App is still loading. Please wait a moment and try again.';
            errEl.classList.remove('hidden');
            return;
        }
        try {
            document.getElementById('login-btn').textContent = 'Signing in...';
            await loginUser(email, password);
        } catch (e) {
            errEl.textContent = e.message.includes('invalid') || e.message.includes('password') ? 'Invalid email or password.' : e.message;
            errEl.classList.remove('hidden');
            document.getElementById('login-btn').textContent = 'Sign In';
        }
    }, { passive: false });

    document.getElementById('login-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    document.getElementById('forgot-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const errEl = document.getElementById('login-error');
        const succEl = document.getElementById('login-success');
        errEl.classList.add('hidden');
        succEl.classList.add('hidden');
        if (!email) {
            errEl.textContent = 'Enter your email address above first, then click Forgot password.';
            errEl.classList.remove('hidden');
            return;
        }
        try {
            await sendPasswordResetEmail(getAuthInstance(), email);
            succEl.textContent = `✓ Password reset email sent to ${email}. Check your inbox.`;
            succEl.classList.remove('hidden');
        } catch(e) {
            errEl.textContent = e.message.includes('user-not-found') ? 'No account found with that email.' : e.message;
            errEl.classList.remove('hidden');
        }
    }, { passive: false });

    // Now initialize Firebase (async) - buttons already work above
    try {
        firebaseOk = await initFirebaseAsync();
        console.log('[Login] Firebase init:', firebaseOk);
        if (firebaseOk) {
            onAuthChange(user => { if (user) window.location.href = 'queue.html'; });
        }
    } catch(e) {
        console.error('[Login] Firebase init error:', e);
    }
</script>
</body>
</html>
