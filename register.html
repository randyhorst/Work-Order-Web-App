<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Shop Work Orders</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white">Create Account</h1>
        <p id="reg-subtitle" class="text-gray-400 mt-2 text-sm">Register with an invite code from your admin</p>
    </div>

    <div class="bg-gray-800 rounded-xl shadow-2xl p-8 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Invite Code</label>
            <input type="text" id="reg-invite" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="XXXXXXXX">
            <p class="text-xs text-gray-500 mt-1">Get this from your admin. Codes expire after 7 days.</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
            <input type="text" id="reg-name" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Your Name">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
            <input type="email" id="reg-email" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="you@example.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
            <input type="password" id="reg-password" class="w-full rounded-lg bg-gray-700 border border-gray-600 text-white p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Min 6 characters">
        </div>
        <div id="reg-error" class="hidden text-red-400 text-sm"></div>
        <div id="reg-success" class="hidden text-green-400 text-sm"></div>
        <button id="reg-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition text-base">Create Account</button>
        <p class="text-center text-sm text-gray-400">Already have an account? <a href="login.html" class="text-indigo-400 hover:underline">Sign in</a></p>
    </div>
</div>

<script type="module">
    import { initFirebase } from './js/firebase-init.js';
    import { registerUser } from './js/auth.js';
    import { validateInviteCode, markInviteCodeUsed } from './js/db.js';

    const params = new URLSearchParams(window.location.search);

    // If no Firebase config stored yet, fetch it from Firestore REST using project ID in URL
    const projectId = params.get('p');
    if (projectId && !localStorage.getItem('shopAppFirebaseConfig')) {
        try {
            const url = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/public/appConfig`;
            const res = await fetch(url);
            if (res.ok) {
                const data = await res.json();
                const f = data.fields || {};
                const getString = k => f[k]?.stringValue || '';
                const config = {
                    apiKey: getString('apiKey'),
                    authDomain: getString('authDomain'),
                    projectId: getString('projectId') || projectId,
                    storageBucket: getString('storageBucket'),
                    messagingSenderId: getString('messagingSenderId'),
                    appId: getString('appId')
                };
                const appSettings = {
                    companyId: getString('companyId'),
                    companyName: getString('companyName')
                };
                localStorage.setItem('shopAppFirebaseConfig', JSON.stringify(config));
                localStorage.setItem('shopAppSettings', JSON.stringify(appSettings));
            }
        } catch(e) { console.warn('Could not fetch config from Firestore REST:', e); }
    }

    initFirebase();

    // Auto-fill invite code if arriving via invite link (?invite=XXXXXXXX)
    const inviteParam = params.get('invite');
    if (inviteParam) {
        document.getElementById('reg-invite').value = inviteParam.toUpperCase();
        document.getElementById('reg-invite').readOnly = true;
        document.getElementById('reg-invite').classList.add('opacity-60', 'cursor-not-allowed');
        document.getElementById('reg-subtitle').textContent = "You've been invited! Fill in your name, email and password to get started.";
        document.getElementById('reg-subtitle').classList.add('text-indigo-300');
    }

    document.getElementById('reg-btn').addEventListener('click', async () => {
        const code = document.getElementById('reg-invite').value.trim().toUpperCase();
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const errEl = document.getElementById('reg-error');
        const succEl = document.getElementById('reg-success');
        errEl.classList.add('hidden');
        succEl.classList.add('hidden');

        if (!code || !name || !email || !password) {
            errEl.textContent = 'Please fill in all fields.'; errEl.classList.remove('hidden'); return;
        }
        if (password.length < 6) {
            errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.remove('hidden'); return;
        }

        document.getElementById('reg-btn').textContent = 'Creating account...';

        try {
            const invite = await validateInviteCode(code);
            if (!invite) {
                errEl.textContent = 'Invalid or expired invite code.'; errEl.classList.remove('hidden');
                document.getElementById('reg-btn').textContent = 'Create Account'; return;
            }
            const cred = await registerUser(email, password, name, invite.companyId, invite.role);
            await markInviteCodeUsed(code, cred.user.uid);
            succEl.textContent = 'Account created! Redirecting...'; succEl.classList.remove('hidden');
            setTimeout(() => window.location.href = 'queue.html', 1500);
        } catch (e) {
            errEl.textContent = e.message.includes('email-already') ? 'That email is already registered.' : e.message;
            errEl.classList.remove('hidden');
            document.getElementById('reg-btn').textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
