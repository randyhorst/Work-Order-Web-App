<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Work Orders</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="text-center">
    <div class="text-6xl mb-4">🔧</div>
    <h1 class="text-3xl font-extrabold text-white mb-2" id="company-title">Shop Work Orders</h1>
    <p class="text-gray-400 mb-8">Redirecting...</p>
    <a href="login.html" id="index-login-link" class="text-indigo-400 underline text-sm">Click here if not redirected</a>
</div>
<script type="module">
    import { initFirebaseAsync } from './js/firebase-init.js';
    import { onAuthChange } from './js/auth.js';
    import { getItem } from './js/storage.js';

    const bootstrapSearch = window.location.search || '';
    document.getElementById('index-login-link').href = `login.html${bootstrapSearch}`;

    const settings = JSON.parse(getItem('shopAppSettings') || '{}');
    if (settings.companyName) document.getElementById('company-title').textContent = settings.companyName;

    const ok = await initFirebaseAsync();
    if (!ok) { window.location.href = `settings.html${bootstrapSearch}`; }
    else {
        onAuthChange(user => {
            window.location.href = user ? 'queue.html' : `login.html${bootstrapSearch}`;
        });
    }
</script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});</script>
</body>
</html>
